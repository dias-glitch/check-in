<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Check-in Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background-color: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
    }

    .login-box {
      background-color: white;
      padding: 30px 40px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      width: 100%;
      max-width: 360px;
      box-sizing: border-box;
      text-align: center;
      animation: fadeIn 0.6s ease-out;
    }

    .login-box h2 {
      margin-bottom: 20px;
      color: #1e293b;
    }

    .login-box input,
    .login-box select,
    .login-box button {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }

    .login-box input {
      border: 1px solid #e2e8f0;
      background-color: #f8fafc;
    }

    .login-box button {
      background-color: #2563eb;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }

    .login-box button:hover {
      background-color: #1d4ed8;
    }

    .login-box button:disabled {
      background-color: #cbd5e1;
      cursor: not-allowed;
    }

    .language-select {
      margin-bottom: 15px;
      text-align: right;
    }

    .language-select select {
      width: auto;
      font-size: 13px;
      padding: 5px 10px;
      border-radius: 20px;
      border: 1px solid #e2e8f0;
    }

    #message {
      color: #ef4444;
      margin-top: 10px;
      font-size: 14px;
      font-weight: bold;
      min-height: 20px;
    }

    #spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #2563eb;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      animation: spin 1s linear infinite;
      margin: 10px auto;
      display: none;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="language-select">
      🌐 
      <select id="languageSelect" onchange="setLanguage(this.value)">
        <option value="ja">日本語</option>
        <option value="en">English</option>
        <option value="de">Deutsch</option>
        <option value="fr">Français</option>
        <option value="ru">Русский</option>
        <option value="pt">Português</option>
        <option value="es">Español</option>
        <option value="zh-CN">简体中文</option>
        <option value="zh-TW">繁體中文</option>
        <option value="ko">한국어</option>
      </select>
    </div>

    <h2 id="title">ログイン</h2>
    <form id="loginForm">
      <input type="text" id="guestName" placeholder="予約者名" required autocomplete="name">
      <input type="text" id="bookingCode" placeholder="予約番号" required autocomplete="off">
      <button type="submit" id="loginBtn">ログイン</button>
    </form>
    <div id="spinner"></div>
    <p id="message"></p>
  </div>

  <script>
    const translations = {
      ja: { title: "ログイン", name: "予約者名", code: "予約番号", button: "ログイン", error: "予約情報が一致しませんでした。", network: "通信エラーが発生しました。" },
      en: { title: "Login", name: "Guest Name", code: "Booking Code", button: "Login", error: "Reservation not found.", network: "Network error occurred." },
      de: { title: "Anmelden", name: "Gastname", code: "Buchungscode", button: "Anmelden", error: "Reservierung nicht gefunden.", network: "Netzwerkfehler." },
      fr: { title: "Connexion", name: "Nom du client", code: "Code de réservation", button: "Se connecter", error: "Réservation introuvable.", network: "Erreur réseau." },
      ru: { title: "Вход", name: "Имя гостя", code: "Код бронирования", button: "Войти", error: "Бронирование не найдено.", network: "Ошибка сети." },
      pt: { title: "Entrar", name: "Nome do hóspede", code: "Código de reserva", button: "Entrar", error: "Reserva não encontrada.", network: "Erro de rede." },
      es: { title: "Iniciar sesión", name: "Nombre del huésped", code: "Código de reserva", button: "Entrar", error: "No se encontró la reserva.", network: "Error de red." },
      "zh-CN": { title: "登录", name: "预订者姓名", code: "预订号码", button: "登录", error: "未找到预订信息。", network: "网络错误。" },
      "zh-TW": { title: "登入", name: "預訂者姓名", code: "預訂編號", button: "登入", error: "找不到預訂資訊。", network: "網路錯誤。" },
      ko: { title: "로그인", name: "예약자 이름", code: "예약 번호", button: "로그인", error: "예약 정보를 찾을 수 없습니다.", network: "네트워크 오류가 발생했습니다." }
    };

    let currentLang = localStorage.getItem("lang") || navigator.language || "ja";
    if (!translations[currentLang]) {
      currentLang = currentLang.startsWith("zh") ? "zh-CN" : "en";
    }

    function applyLanguage(lang) {
      const t = translations[lang] || translations["en"];
      document.title = t.title + " - Smart Check-in";
      document.getElementById("title").innerText = t.title;
      document.getElementById("guestName").placeholder = t.name;
      document.getElementById("bookingCode").placeholder = t.code;
      document.getElementById("loginBtn").innerText = t.button;
      document.getElementById("languageSelect").value = lang;
      localStorage.setItem("lang", lang);
    }

    function setLanguage(lang) {
      currentLang = lang;
      applyLanguage(lang);
    }

    applyLanguage(currentLang);

    // ★修正後のGASのURLをここに貼ってください
    const scriptURL = "https://script.google.com/macros/s/AKfycby2-TCHJJgwEJ_Ckmy5W4W5NEWrhu63z-6e1aodLnRmqYrucNsLJinVVniPExb2b98cJg/exec";

    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();
      
      const rawName = document.getElementById("guestName").value;
      const rawCode = document.getElementById("bookingCode").value;
      
      const name = normalizeName(rawName);
      const booking = normalizeBookingCode(rawCode);

      if (!name || !booking) return;

      document.getElementById("loginBtn").disabled = true;
      document.getElementById("loginBtn").innerText = "Loading...";
      document.getElementById("spinner").style.display = "block";
      document.getElementById("message").innerText = "";

      fetch(`${scriptURL}?name=${encodeURIComponent(name)}&booking=${encodeURIComponent(booking)}`)
        .then(res => res.json())
        .then(data => {
          if (data.result === "OK") {
            localStorage.setItem("temp_guest_data", JSON.stringify(data));
            localStorage.setItem("temp_guest_name", rawName.trim()); // 表示用に元の名前（スペースあり）を保存
            localStorage.setItem("temp_guest_booking", booking);
            window.location.href = `checkin.html?lang=${currentLang}`;
          } else {
            showMessage(translations[currentLang].error);
          }
        })
        .catch((err) => {
          console.error(err);
          showMessage(translations[currentLang].network);
        })
        .finally(() => {
          document.getElementById("loginBtn").disabled = false;
          document.getElementById("loginBtn").innerText = translations[currentLang].button;
          document.getElementById("spinner").style.display = "none";
        });
    });

    function showMessage(msg) {
      const m = document.getElementById("message");
      m.innerText = msg;
      m.style.opacity = 1;
      setTimeout(() => { m.style.opacity = 0; }, 4000);
    }

    // 名前から全ての空白を除去して小文字にする（GASと合わせる）
    function normalizeName(name) {
      return name.replace(/　/g, "").replace(/\s+/g, "").toLowerCase();
    }

    // 予約番号から全角を除去し空白を消す
    function normalizeBookingCode(code) {
      return code.replace(/[Ａ-Ｚａ-ｚ０-９]/g, s =>
        String.fromCharCode(s.charCodeAt(0) - 0xFEE0))
        .replace(/\s+/g, "")
        .toUpperCase(); // 予約番号は大文字で統一
    }
  </script>
</body>
</html>
