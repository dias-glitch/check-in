  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />

  <style>
    :root {
      --primary-color: #2563eb;
      --bg-color: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-sub: #64748b;
      --border-color: #e2e8f0;
    }

    body {
      margin: 0;
      padding: 20px 10px;
      font-family: 'Noto Sans JP', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .checkin-container {
      background-color: var(--card-bg);
      padding: 40px 30px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      width: 100%;
      max-width: 480px;
      position: relative;
      align-self: center;
    }

    .language-header {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 20px;
      align-items: center;
    }

    .language-header select {
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 5px 15px;
      font-size: 13px;
      background: white;
      outline: none;
    }

    h2 {
      text-align: center;
      font-size: 1.5rem;
      margin-bottom: 30px;
    }

    #guestInfo {
      background-color: #f1f5f9;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 30px;
      font-size: 14px;
      line-height: 1.8;
      border-left: 4px solid var(--primary-color);
    }

    #guestInfo p { margin: 0; display: flex; justify-content: space-between; }
    #guestInfo strong { color: var(--text-sub); font-weight: normal; }

    .form-group { margin-bottom: 20px; }

    label {
      display: block;
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 8px;
    }

    label i { margin-right: 8px; color: var(--primary-color); width: 16px; text-align: center; }

    input, select {
      width: 100%;
      padding: 12px 15px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      box-sizing: border-box;
      background-color: #fff;
    }

    button {
      width: 100%;
      background-color: var(--primary-color);
      color: white;
      padding: 16px;
      font-size: 17px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      margin-top: 30px;
      cursor: pointer;
    }

    #message { text-align: center; margin-top: 20px; font-weight: bold; }
  </style>
</head>

    // 【追加】日付を綺麗にする関数
    function formatDate(dateStr) {
      if (!dateStr || dateStr === "N/A") return "N/A";
      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return dateStr;
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}/${m}/${day}`;
    }

    const params = new URLSearchParams(window.location.search);

      document.getElementById("languageSelect").value = lang;
      document.getElementById("labelPhone").innerHTML = `<i class="fa-solid fa-phone"></i>${t.labelPhone}`;
      document.getElementById("labelEmail").innerHTML = `<i class="fa-solid fa-envelope"></i>${t.labelEmail}`;

      document.querySelectorAll("option[data-i18n-option]").forEach(opt => {
        opt.innerText = t[opt.getAttribute("data-i18n-option")] || opt.innerText;
      });
      document.querySelector("#nationalitySelect option[value='']").innerText = t.emptyNationality;
      document.querySelector("#genderSelect option[value='']").innerText = t.emptyGender;

      const savedData = JSON.parse(localStorage.getItem("temp_guest_data"));
      const savedName = localStorage.getItem("temp_guest_name");
      const savedBooking = localStorage.getItem("temp_guest_booking");

      if (savedData && savedName) {
        document.getElementById("guestInfo").innerHTML = `
          <p><strong>${t.labelName}</strong> <span>${savedName}</span></p>
          <hr style="border:0; border-top:1px solid #e2e8f0; margin:10px 0;">
          <p><strong>${t.labelCode}</strong> <span>${savedBooking}</span></p>
          <p><strong>${t.labelCheckin}</strong> <span>${formatDate(savedData.checkin)}</span></p>
          <p><strong>${t.labelCheckout}</strong> <span>${formatDate(savedData.checkout)}</span></p>
          <p><strong>${t.labelRoom}</strong> <span>${savedData.room}</span></p>`;
      }

      $('#nationalitySelect').select2({ width: '100%', language: lang, placeholder: t.emptyNationality });
    }

    applyLanguage(currentLang);

    function setLanguage(l) {
      localStorage.setItem("lang", l);
      applyLanguage(l);
    }

    const scriptURL = "https://script.google.com/macros/s/AKfycby2-TCHJJgwEJ_Ckmy5W4W5NEWrhu63z-6e1aodLnRmqYrucNsLJinVVniPExb2b98cJg/exec";

    document.getElementById("checkinForm").addEventListener("submit", function (e) {
      e.preventDefault();
      const btn = document.getElementById("submitBtn");
      const t = translations[localStorage.getItem("lang") || "ja"] || translations["en"];
      
      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Sending...';

      const formData = new FormData(e.target);
      formData.append("name", localStorage.getItem("temp_guest_name"));
      formData.append("booking", localStorage.getItem("temp_guest_booking"));

      fetch(scriptURL, { method: "POST", body: formData })
        .then(res => res.text())
        .then(res => {
          if (res === "RECEIVED") {
            const msg = document.getElementById("message");
            msg.style.color = "green";
            msg.innerText = t.success;
            setTimeout(() => window.location.href = "https://wiseowlhostels.com/", 2500);
          }
        })
        .catch(() => {
          btn.disabled = false;
          btn.innerText = t.submit;
          alert("Network error.");
        });
    });
  </script>
</body>
</html>
