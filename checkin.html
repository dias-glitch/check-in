<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Check-in</title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/intlTelInput.min.js"></script>

  <style>
    :root {
      --primary-color: #2563eb;
      --bg-color: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-sub: #64748b;
      --border-color: #e2e8f0;
    }

    body {
      margin: 0;
      padding: 20px 10px;
      font-family: 'Noto Sans JP', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .checkin-container {
      background-color: var(--card-bg);
      padding: 40px 30px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      width: 100%;
      max-width: 480px;
      position: relative;
      align-self: center;
    }

    .language-header {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 20px;
      align-items: center;
    }

    .language-header select {
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 5px 15px;
      font-size: 13px;
      background: white;
      outline: none;
    }

    h2 {
      text-align: center;
      font-size: 1.5rem;
      margin-bottom: 30px;
    }

    #guestInfo {
      background-color: #f1f5f9;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 30px;
      font-size: 14px;
      line-height: 1.8;
      border-left: 4px solid var(--primary-color);
    }

    #guestInfo p { margin: 0; display: flex; justify-content: space-between; }
    #guestInfo strong { color: var(--text-sub); font-weight: normal; }

    .form-group { margin-bottom: 20px; }

    label {
      display: block;
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 8px;
    }

    label i { margin-right: 8px; color: var(--primary-color); width: 16px; text-align: center; }

    input, select {
      width: 100%;
      padding: 12px 15px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      box-sizing: border-box;
      background-color: #fff;
    }

    /* 国番号入力欄の幅調整 */
    .iti { width: 100%; }

    button {
      width: 100%;
      background-color: var(--primary-color);
      color: white;
      padding: 16px;
      font-size: 17px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      margin-top: 30px;
      cursor: pointer;
    }

    #message { text-align: center; margin-top: 20px; font-weight: bold; }
  </style>
</head>
<body>
  <div class="checkin-container">
    <div class="language-header">
      <i class="fa-solid fa-globe" style="margin-right: 8px;"></i>
      <select id="languageSelect" onchange="setLanguage(this.value)">
        <option value="ja">日本語</option>
        <option value="en">English</option>
        <option value="de">Deutsch</option>
        <option value="fr">Français</option>
        <option value="ru">Русский</option>
        <option value="pt">Português</option>
        <option value="es">Español</option>
        <option value="zh-CN">简体中文</option>
        <option value="zh-TW">繁體中文</option>
        <option value="ko">한국어</option>
      </select>
    </div>

    <h2 id="formTitle">Check-in</h2>
    
    <div id="guestInfo">Loading...</div>

    <form id="checkinForm">
      <div class="form-group">
        <label id="labelDob">生年月日:</label>
        <input type="date" name="dob" required>
      </div>

      <div class="form-group">
        <label id="labelGender">性別:</label>
        <select name="gender" id="genderSelect" required>
          <option value="">Select</option>
          <option value="M" data-i18n-option="genderMale">男性</option>
          <option value="F" data-i18n-option="genderFemale">女性</option>
          <option value="Other" data-i18n-option="genderOther">その他</option>
        </select>
      </div>

      <div class="form-group">
        <label id="labelNationality">国籍:</label>
        <select name="nationality" id="nationalitySelect" required>
          <option value="">Select</option>
          <optgroup label="Popular">
            <option value="Japan" data-i18n-option="countryJapan">Japan</option>
            <option value="USA" data-i18n-option="countryUSA">USA</option>
            <option value="China" data-i18n-option="countryChina">China</option>
            <option value="South Korea" data-i18n-option="countryKorea">South Korea</option>
            <option value="Taiwan" data-i18n-option="countryTaiwan">Taiwan</option>
            <option value="Thailand" data-i18n-option="countryThailand">Thailand</option>
          </optgroup>
          <optgroup label="All Countries">
            <option value="Afghanistan">Afghanistan</option>
            <option value="Australia">Australia</option>
            <option value="Germany" data-i18n-option="countryGermany">Germany</option>
            <option value="France" data-i18n-option="countryFrance">France</option>
            <option value="Russia" data-i18n-option="countryRussia">Russia</option>
            </optgroup>
        </select>
      </div>

      <div class="form-group">
        <label id="labelPrev">前泊地:</label>
        <input type="text" name="previousStay" required>
      </div>

      <div class="form-group">
        <label id="labelNext">後泊地:</label>
        <input type="text" name="nextDestination" required>
      </div>

      <div class="form-group">
        <label id="labelPhone"><i class="fa-solid fa-phone"></i>電話番号:</label>
        <input type="tel" name="phone" id="phone" placeholder="e.g. 9012345678" required>
      </div>

      <div class="form-group">
        <label id="labelEmail"><i class="fa-solid fa-envelope"></i>メールアドレス:</label>
        <input type="email" name="email" id="email" placeholder="e.g. guest@example.com" required>
      </div>

      <button type="submit" id="submitBtn">Submit</button>
    </form>
    <div id="message"></div>
  </div>

  <script>
  // 1. 全言語の翻訳データ（修正版）
    const translations = {
      ja: {
        formTitle: "チェックイン情報",
        labelDob: "生年月日:", labelGender: "性別:", labelNationality: "国籍:", labelPrev: "前泊地:", labelNext: "後泊地:", labelPhone: "電話番号:", labelEmail: "メールアドレス:",
        submit: "送信", success: "送信完了。転送します...", labelName: "名前:", labelCode: "予約番号:",
        labelCheckin: "到着日:", labelCheckout: "出発日:", labelRoom: "部屋:",
        emptyNationality: "選択してください", emptyGender: "選択してください",
        countryJapan: "日本", countryUSA: "アメリカ", countryChina: "中国", countryGermany: "ドイツ", countryFrance: "フランス", countryTaiwan: "台湾", countryKorea: "韓国", countryItaly: "イタリア", countrySwitzerland: "スイス", countryRussia: "ロシア", countryThailand: "タイ", countryVietnam: "ベトナム",
        genderMale: "男性", genderFemale: "女性", genderOther: "その他"
      },
      en: {
        formTitle: "Check-in Information",
        labelDob: "Date of Birth:", labelGender: "Gender:", labelNationality: "Nationality:", labelPrev: "Previous Stay:", labelNext: "Next Destination:", labelPhone: "Phone number:", labelEmail: "Email address:",
        submit: "Submit", success: "Success! Redirecting...", labelName: "Name:", labelCode: "Booking No:",
        labelCheckin: "Check-in:", labelCheckout: "Check-out:", labelRoom: "Room:",
        emptyNationality: "Please select", emptyGender: "Please select",
        countryJapan: "Japan", countryUSA: "USA", countryChina: "China", countryGermany: "Germany", countryFrance: "France", countryTaiwan: "Taiwan", countryKorea: "South Korea", countryItaly: "Italy", countrySwitzerland: "Switzerland", countryRussia: "Russia", countryThailand: "Thailand", countryVietnam: "Vietnam",
        genderMale: "Male", genderFemale: "Female", genderOther: "Other"
      },
      de: { // ドイツ語
        formTitle: "Check-in Informationen",
        labelDob: "Geburtsdatum:", labelGender: "Geschlecht:", labelNationality: "Nationalität:", labelPrev: "Vorheriger Ort:", labelNext: "Nächstes Ziel:", labelPhone: "Telefonnummer:", labelEmail: "E-Mail-Adresse:",
        submit: "Absenden", success: "Erfolgreich! Weiterleitung...", labelName: "Name:", labelCode: "Buchungsnummer:",
        labelCheckin: "Check-in:", labelCheckout: "Check-out:", labelRoom: "Zimmer:",
        emptyNationality: "Bitte auswählen", emptyGender: "Bitte auswählen",
        countryJapan: "Japan", countryUSA: "USA", countryChina: "China", countryGermany: "Deutschland", countryFrance: "Frankreich", countryTaiwan: "Taiwan", countryKorea: "Südkorea", countryItaly: "Italien", countrySwitzerland: "Schweiz", countryRussia: "Russland", countryThailand: "Thailand", countryVietnam: "Vietnam",
        genderMale: "Männlich", genderFemale: "Weiblich", genderOther: "Andere"
      },
      fr: { // フランス語
        formTitle: "Informations d'enregistrement",
        labelDob: "Date de naissance:", labelGender: "Genre:", labelNationality: "Nationalité:", labelPrev: "Lieu précédent:", labelNext: "Prochaine destination:", labelPhone: "Numéro de téléphone:", labelEmail: "Adresse e-mail:",
        submit: "Envoyer", success: "Succès! Redirection...", labelName: "Nom:", labelCode: "N° de réservation:",
        labelCheckin: "Arrivée:", labelCheckout: "Départ:", labelRoom: "Chambre:",
        emptyNationality: "Veuillez choisir", emptyGender: "Veuillez choisir",
        countryJapan: "Japon", countryUSA: "États-Unis", countryChina: "Chine", countryGermany: "Allemagne", countryFrance: "France", countryTaiwan: "Taïwan", countryKorea: "Corée du Sud", countryItaly: "Italie", countrySwitzerland: "Suisse", countryRussia: "Russie", countryThailand: "Thaïlande", countryVietnam: "Vietnam",
        genderMale: "Homme", genderFemale: "Femme", genderOther: "Autre"
      },
      ru: { // ロシア語
        formTitle: "Информация для регистрации",
        labelDob: "Дата рождения:", labelGender: "Пол:", labelNationality: "Гражданство:", labelPrev: "Предыдущее место:", labelNext: "Следующий пункт:", labelPhone: "Номер телефона:", labelEmail: "Эл. почта:",
        submit: "Отправить", success: "Успешно! Перенаправление...", labelName: "Имя:", labelCode: "№ брони:",
        labelCheckin: "Заезд:", labelCheckout: "Выезд:", labelRoom: "Номер:",
        emptyNationality: "Выберите", emptyGender: "Выберите",
        countryJapan: "Япония", countryUSA: "США", countryChina: "Китай", countryGermany: "Германия", countryFrance: "Франция", countryTaiwan: "Тайвань", countryKorea: "Южная Корея", countryItaly: "Италия", countrySwitzerland: "Швейцария", countryRussia: "Россия", countryThailand: "Таиланд", countryVietnam: "Вьетнам",
        genderMale: "Мужской", genderFemale: "Женский", genderOther: "Другое"
      },
      pt: { // ポルトガル語
        formTitle: "Informações de Check-in",
        labelDob: "Data de nascimento:", labelGender: "Gênero:", labelNationality: "Nacionalidade:", labelPrev: "Local anterior:", labelNext: "Próximo destino:", labelPhone: "Telefone:", labelEmail: "E-mail:",
        submit: "Enviar", success: "Sucesso! Redirecionando...", labelName: "Nome:", labelCode: "Nº reserva:",
        labelCheckin: "Entrada:", labelCheckout: "Saída:", labelRoom: "Quarto:",
        emptyNationality: "Por favor selecione", emptyGender: "Por favor selecione",
        countryJapan: "Japão", countryUSA: "EUA", countryChina: "China", countryGermany: "Alemanha", countryFrance: "França", countryTaiwan: "Taiwan", countryKorea: "Coreia do Sul", countryItaly: "Itália", countrySwitzerland: "Suíça", countryRussia: "Rússia", countryThailand: "Tailândia", countryVietnam: "Vietnã",
        genderMale: "Masculino", genderFemale: "Feminino", genderOther: "Outro"
      },
      es: { // スペイン語（参考までに含めています）
        formTitle: "Información de Check-in",
        labelDob: "Fecha de nacimiento:", labelGender: "Género:", labelNationality: "Nacionalidad:", labelPrev: "Lugar anterior:", labelNext: "Próximo destino:", labelPhone: "Teléfono:", labelEmail: "Correo electrónico:",
        submit: "Enviar", success: "¡Éxito! Redirigiendo...", labelName: "Nombre:", labelCode: "Código:",
        labelCheckin: "Entrada:", labelCheckout: "Salida:", labelRoom: "Habitación:",
        emptyNationality: "Seleccione", emptyGender: "Seleccione",
        countryJapan: "Japón", countryUSA: "EE. UU.", countryChina: "China", countryGermany: "Alemania", countryFrance: "Francia", countryTaiwan: "Taiwán", countryKorea: "Corea del Sur", countryItaly: "Italia", countrySwitzerland: "Suiza", countryRussia: "Rusia", countryThailand: "Tailandia", countryVietnam: "Vietnam",
        genderMale: "Hombre", genderFemale: "Mujer", genderOther: "Otro"
      }
    };
    // 日付フォーマット関数
    function formatDate(dateStr) {
      if (!dateStr || dateStr === "N/A") return "N/A";
      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return dateStr;
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}/${m}/${day}`;
    }

    const params = new URLSearchParams(window.location.search);
    let currentLang = params.get("lang") || localStorage.getItem("lang") || "ja";

    function applyLanguage(lang) {
      const t = translations[lang] || translations["en"];
      
      document.getElementById("formTitle").innerText = t.formTitle;
      document.getElementById("labelDob").innerHTML = `<i class="fa-solid fa-cake-candles"></i>${t.labelDob}`;
      document.getElementById("labelGender").innerHTML = `<i class="fa-solid fa-venus-mars"></i>${t.labelGender}`;
      document.getElementById("labelNationality").innerHTML = `<i class="fa-solid fa-passport"></i>${t.labelNationality}`;
      document.getElementById("labelPrev").innerHTML = `<i class="fa-solid fa-plane-arrival"></i>${t.labelPrev}`;
      document.getElementById("labelNext").innerHTML = `<i class="fa-solid fa-plane-departure"></i>${t.labelNext}`;
      document.getElementById("labelPhone").innerHTML = `<i class="fa-solid fa-phone"></i>${t.labelPhone}`;
      document.getElementById("labelEmail").innerHTML = `<i class="fa-solid fa-envelope"></i>${t.labelEmail}`;
      document.getElementById("submitBtn").innerText = t.submit;
      document.getElementById("languageSelect").value = lang;

      document.querySelectorAll("option[data-i18n-option]").forEach(opt => {
        opt.innerText = t[opt.getAttribute("data-i18n-option")] || opt.innerText;
      });
      document.querySelector("#nationalitySelect option[value='']").innerText = t.emptyNationality;
      document.querySelector("#genderSelect option[value='']").innerText = t.emptyGender;

      const savedData = JSON.parse(localStorage.getItem("temp_guest_data"));
      const savedName = localStorage.getItem("temp_guest_name");
      const savedBooking = localStorage.getItem("temp_guest_booking");

      if (savedData && savedName) {
        document.getElementById("guestInfo").innerHTML = `
          <p><strong>${t.labelName}</strong> <span>${savedName}</span></p>
          <hr style="border:0; border-top:1px solid #e2e8f0; margin:10px 0;">
          <p><strong>${t.labelCode}</strong> <span>${savedBooking}</span></p>
          <p><strong>${t.labelCheckin}</strong> <span>${formatDate(savedData.checkin)}</span></p>
          <p><strong>${t.labelCheckout}</strong> <span>${formatDate(savedData.checkout)}</span></p>
          <p><strong>${t.labelRoom}</strong> <span>${savedData.room}</span></p>`;
      }
      $('#nationalitySelect').select2({ width: '100%', language: lang, placeholder: t.emptyNationality });
    }

    applyLanguage(currentLang);

    // --- 電話番号入力の初期化 ---
    const phoneInput = document.querySelector("#phone");
    const iti = window.intlTelInput(phoneInput, {
      utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/utils.js",
      autoPlaceholder: "aggressive",
      separateDialCode: true,
      preferredCountries: ["jp", "us", "cn", "kr", "tw"],
    });

    function setLanguage(l) {
      localStorage.setItem("lang", l);
      applyLanguage(l);
    }

    const scriptURL = "https://script.google.com/macros/s/AKfycbzNuCxrM_5rxtbRNIOk6xMOaCxMBLK-OczJJX0QpXQxppcz3lckMAB_qlLlDCHTyZQfTQ/exec";

    document.getElementById("checkinForm").addEventListener("submit", function (e) {
      e.preventDefault();
      const btn = document.getElementById("submitBtn");
      const t = translations[localStorage.getItem("lang") || "ja"] || translations["en"];
      
      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Sending...';

      const formData = new FormData(e.target);
      
      // ★国番号込みの電話番号をセット
      formData.set("phone", iti.getNumber());

      formData.append("name", localStorage.getItem("temp_guest_name"));
      formData.append("booking", localStorage.getItem("temp_guest_booking"));

      fetch(scriptURL, { method: "POST", body: formData })
        .then(res => res.text())
        .then(res => {
          if (res === "RECEIVED") {
            const msg = document.getElementById("message");
            msg.style.color = "green";
            msg.innerText = t.success;
            setTimeout(() => window.location.href = "https://wiseowlhostels.com/", 2500);
          }
        })
        .catch(() => {
          btn.disabled = false;
          btn.innerText = t.submit;
          alert("Network error.");
        });
    });
  </script>
</body>
</html>
